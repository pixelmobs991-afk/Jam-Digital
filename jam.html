<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Night Dashboard</title>
    <style>
        body {
          /* Background gambar dibuang, diganti warna gelap solid */
          background-color: #0b0e14; 
          color: #f8fafc;
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 100vh;
          margin: 0;
        }
        #clock {
            font-size: 5rem;
            font-weight: bold;
            letter-spacing: -2px;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }
        #date {
            font-size: 1.3rem;
            color: #94a3b8;
            margin-bottom: 10px;
        }
        #weather {
            font-size: 1.1rem;
            color: #cbd5e1;
            margin-bottom: 50px; /* Jarak ke area kode di bawahnya */
        }

        /* Styling teks kode Python murni tanpa box */
        .code-block {
            font-family: 'Consolas', 'Courier New', Courier, monospace;
            font-size: 1.6rem;
            line-height: 1.6;
            text-align: left; 
        }
        .keyword { color: #c678dd; }     /* Ungu: if, while */
        .function { color: #61afef; }    /* Biru: success */
        .operator { color: #56b6c2; }    /* Toska: == */
        .boolean { color: #d19a66; }     /* Oranye: True, False */
        .action { color: #e5c07b; }      /* Kuning: celebrate, try_again, be_awesome */
        .indent { padding-left: 2.5rem; }  /* Efek tab/indentasi */
    </style>
</head>
<body>

    <div id="clock">00:00:00</div>
    <div id="date">Hari ini, Tanggal</div>
    <div id="weather">Malam yang indah seperti dia... 🌌</div>

    <div class="code-block">
        <div>
            <span class="keyword">if</span> <span class="function">kamu_masih_belum_tidur</span>() <span class="operator">==</span> <span class="boolean">True</span>:
        </div>
        <div class="indent">
            <span class="action">tidur_sekarang_yaa</span>()
        </div>
        <div>
            <span class="keyword">while</span> <span class="function">belum_bisa_tidur</span>() <span class="operator">==</span> <span class="boolean">False</span>:
        </div>
        <div class="indent">
            <span class="action">mikirin_siapa_sihh</span>()
        </div>
        <div class="indent">
            <span class="action">ayo_tidur_besok_bangun_pagi</span>()
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            
            // Update Jam
            const timeString = now.toLocaleTimeString('id-ID', { hour12: false });
            document.getElementById('clock').textContent = timeString;
            
            // Update Tanggal
            const dateString = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' });
            document.getElementById('date').textContent = dateString;
        }

        // Jalankan tiap detik
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
